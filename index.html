<!DOCTYPE html>
<html lang="en">
<head>
    <title>ERA5 Monthly Weather Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-velocity@1.6.0/dist/leaflet-velocity.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-velocity@1.6.0/dist/leaflet-velocity.min.css"/>
    
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: Arial, sans-serif; overflow: hidden; 
            background: #111;
        }
        
        #map { width: 100%; height: 100%; z-index: 1; }
        
        #control-panel {
            position: absolute; 
            top: 20px; 
            right: 0; 
            width: 320px;
            height: calc(100% - 40px);
            background: rgba(30, 30, 30, 0.95); 
            color: #fff; 
            z-index: 1000;
            transform: translateX(100%);
            transition: transform 0.4s ease-in-out; 
            border-radius: 10px 0 0 10px;
            box-shadow: -2px 0 10px rgba(0,0,0,0.5); 
        }

        #control-panel.open {
            transform: translateX(0);
        }

        #toggle-trigger { 
            position: absolute; 
            left: -50px;
            top: 0; 
            width: 50px; 
            height: 100%; 
            background: rgba(30, 30, 30, 0.95);
            border-radius: 10px 0 0 10px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            writing-mode: vertical-rl;
            text-orientation: upright;
            letter-spacing: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: -2px 0 10px rgba(0,0,0,0.5);
            user-select: none;
            -webkit-user-select: none;
        }

        .panel-content {
            padding: 20px;
            height: 100%;
            overflow-y: auto;
            box-sizing: border-box;
        }

        .panel-section { margin-bottom: 25px; border-bottom: 1px solid #444; padding-bottom: 15px; }
        .panel-section:last-child { border-bottom: none; }
        .panel-section h3 { margin-top: 0; font-size: 16px; color: #4da6ff; }
        label { display: block; margin-bottom: 12px; cursor: pointer; font-size: 14px; }
        
        .custom-time-selector {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .time-row {
            display: flex;
            align-items: center;
            position: relative;
        }

        #row-year { z-index: 4; }
        #row-month { z-index: 3; }
        #row-day { z-index: 2; }
        #row-time { z-index: 1; }

        .time-label {
            width: 120px;
            font-size: 14px;
            color: #ddd;
        }

        .time-dropdown-container {
            flex: 1;
            position: relative;
        }

        .time-selected {
            background: #4da6ff;
            color: #000;
            font-weight: bold;
            font-size: 14px;
            padding: 8px;
            text-align: center;
            border-radius: 4px;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }

        .time-selected:hover {
            background: #66b5ff;
        }

        .time-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            max-height: 160px;
            overflow-y: auto;
            background: #222;
            border: 1px solid #555;
            border-top: none;
            border-radius: 0 0 4px 4px;
            display: none; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.6);
            scrollbar-width: thin;
        }

        .time-dropdown-container:hover .time-list {
            display: block;
        }
        
        .time-list::-webkit-scrollbar { width: 6px; }
        .time-list::-webkit-scrollbar-thumb { background: #666; border-radius: 3px; }
        .time-list::-webkit-scrollbar-track { background: #222; }

        .time-item {
            padding: 8px;
            font-size: 14px;
            text-align: center;
            cursor: pointer;
            color: #aaa;
            transition: background 0.2s, color 0.2s;
            user-select: none;
            border-bottom: 1px solid #333;
        }

        .time-item:last-child { border-bottom: none; }
        .time-item:hover { background: #333; color: #fff; }
        .time-item.active { background: #4da6ff; color: #000; font-weight: bold; }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <div id="control-panel">
        <div id="toggle-trigger">OPTIONS</div>
        
        <div class="panel-content">
            <div class="panel-section">
                <h3>1. Base Map</h3>
                <label><input type="radio" name="basemap" value="dark" checked> Dark Base Map</label>
                <label><input type="radio" name="basemap" value="ocean"> Oceans Base Map</label>
            </div>

            <div class="panel-section">
                <h3>2. Time Selection</h3>
                <div class="custom-time-selector">
                    <div class="time-row" id="row-year">
                        <div class="time-label">Year:</div>
                        <div class="time-dropdown-container">
                            <div class="time-selected" id="display-year">2026</div>
                            <div class="time-list" id="list-year"></div>
                        </div>
                    </div>
                    
                    <div class="time-row" id="row-month">
                        <div class="time-label">Month:</div>
                        <div class="time-dropdown-container">
                            <div class="time-selected" id="display-month">Jan</div>
                            <div class="time-list" id="list-month"></div>
                        </div>
                    </div>
                    
                    <div class="time-row" id="row-day">
                        <div class="time-label">Day:</div>
                        <div class="time-dropdown-container">
                            <div class="time-selected" id="display-day">01</div>
                            <div class="time-list" id="list-day"></div>
                        </div>
                    </div>
                    
                    <div class="time-row" id="row-time">
                        <div class="time-label">Time (UTC/MYT):</div>
                        <div class="time-dropdown-container">
                            <div class="time-selected" id="display-time">00:00/08:00</div>
                            <div class="time-list" id="list-time"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="panel-section">
                <h3>3. Weather Parameter</h3>
                <label><input type="radio" name="parameter" value="none" checked> None (Base Map Only)</label>
                <label><input type="radio" name="parameter" value="temp"> Temperature</label>
                <label><input type="radio" name="parameter" value="geo"> Geopotential</label>
                <label><input type="radio" name="parameter" value="rain"> Specific Rain Water Content</label>
                <label><input type="radio" name="parameter" value="wind"> Wind Layer</label>
            </div>

            <div class="panel-section">
                <h3>4. Wind Overlay</h3>
                <label><input type="checkbox" id="toggle-wind-anim"> Animated Wind Particles (850 hPa)</label>
            </div>
        </div>
    </div>

    <script>
        var panel = document.getElementById('control-panel');
        var trigger = document.getElementById('toggle-trigger');

        trigger.addEventListener('click', function(e) {
            panel.classList.toggle('open');
            e.stopPropagation(); 
        });

        var map = L.map('map', { zoomControl: false }).setView([5.0, 114.0], 5);
        L.control.zoom({ position: 'topleft' }).addTo(map);

        map.on('click', function() {
            if (panel.classList.contains('open')) {
                panel.classList.remove('open');
            }
        });

        panel.addEventListener('click', function(e) { e.stopPropagation(); });
        
        var darkBase = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Dark_Gray_Base/MapServer/tile/{z}/{y}/{x}');
        var darkLabels = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Dark_Gray_Reference/MapServer/tile/{z}/{y}/{x}');
        var darkMap = L.layerGroup([darkBase, darkLabels]);

        var oceanBase = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}');
        var oceanLabels = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Reference/MapServer/tile/{z}/{y}/{x}');
        var oceanMap = L.layerGroup([oceanBase, oceanLabels]);

        darkMap.addTo(map);

        var currentImageLayer = null;
        var windVelocityLayer = null;
        var imageBounds = [[90, 0], [-90, 360]]; 

        let timeState = { year: '2026', month: '01', day: '01', time: '00' };

        const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        const timeOptions = [
            { val: '00', label: '00:00/08:00' },
            { val: '06', label: '06:00/14:00' },
            { val: '12', label: '12:00/20:00' },
            { val: '18', label: '18:00/02:00' }
        ];

        function renderList(containerId, displayId, items, selectedValue, onSelect) {
            const container = document.getElementById(containerId);
            const display = document.getElementById(displayId);
            container.innerHTML = '';
            let selectedLabel = '';

            items.forEach(item => {
                if (item.value === selectedValue) { selectedLabel = item.label; }
                
                let div = document.createElement('div');
                div.className = 'time-item' + (item.value === selectedValue ? ' active' : '');
                div.innerText = item.label;
                div.dataset.value = item.value;
                
                div.onclick = function() {
                    container.style.display = 'none';
                    setTimeout(() => container.style.display = '', 100); 
                    onSelect(item.value, item.label);
                };
                container.appendChild(div);
            });

            if (selectedLabel) { display.innerText = selectedLabel; }
        }

        function updateActiveSelection(containerId, displayId, selectedValue, selectedLabel) {
            const container = document.getElementById(containerId);
            const display = document.getElementById(displayId);
            const items = container.getElementsByClassName('time-item');
            
            display.innerText = selectedLabel;

            for (let item of items) {
                if (item.dataset.value === selectedValue) {
                    item.classList.add('active');
                    item.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
                } else {
                    item.classList.remove('active');
                }
            }
        }

        function updateDaysList() {
            let maxDays = new Date(parseInt(timeState.year), parseInt(timeState.month), 0).getDate();
            
            if (parseInt(timeState.day) > maxDays) {
                timeState.day = maxDays.toString().padStart(2, '0');
            }
            
            let days = [];
            for (let i = 1; i <= maxDays; i++) {
                let val = i.toString().padStart(2, '0');
                days.push({ label: val, value: val });
            }
            
            renderList('list-day', 'display-day', days, timeState.day, (val, label) => {
                timeState.day = val;
                updateActiveSelection('list-day', 'display-day', timeState.day, label);
                triggerMapUpdate();
            });
        }

        function initTimeSelectors() {
            let years = [];
            for (let i = 2026; i >= 2020; i--) { years.push({ label: i.toString(), value: i.toString() }); }
            
            let months = monthNames.map((m, i) => {
                let val = (i + 1).toString().padStart(2, '0');
                return { label: m, value: val };
            });

            let times = timeOptions.map(t => ({ label: t.label, value: t.val }));

            renderList('list-year', 'display-year', years, timeState.year, (val, label) => {
                timeState.year = val;
                updateActiveSelection('list-year', 'display-year', timeState.year, label);
                updateDaysList();
                triggerMapUpdate();
            });

            renderList('list-month', 'display-month', months, timeState.month, (val, label) => {
                timeState.month = val;
                updateActiveSelection('list-month', 'display-month', timeState.month, label);
                updateDaysList(); 
                triggerMapUpdate();
            });

            renderList('list-time', 'display-time', times, timeState.time, (val, label) => {
                timeState.time = val;
                updateActiveSelection('list-time', 'display-time', timeState.time, label);
                triggerMapUpdate();
            });

            updateDaysList(); 
        }

        initTimeSelectors();

        function triggerMapUpdate() {
            updateStaticLayer();
            updateWindLayer();
        }

        function updateStaticLayer() {
            var selectedParam = $('input[name="parameter"]:checked').val();
            var y = timeState.year;
            var m = timeState.month;
            var d = timeState.day;
            var t = timeState.time;

            if (currentImageLayer) {
                map.removeLayer(currentImageLayer);
                currentImageLayer = null;
            }

            // FIX: Treats 'wind' just like the other images now!
            if (selectedParam !== 'none') {
                var imageUrl = `data/${selectedParam}_${y}${m}${d}_${t}.png`;
                currentImageLayer = L.imageOverlay(imageUrl, imageBounds, { opacity: 0.65 });
                currentImageLayer.addTo(map);
            }
        }

        function updateWindLayer() {
            if (windVelocityLayer) {
                map.removeLayer(windVelocityLayer);
                windVelocityLayer = null;
            }

            if ($('#toggle-wind-anim').is(':checked')) {
                var y = timeState.year;
                var m = timeState.month;
                var d = timeState.day;
                var t = timeState.time;
                
                var jsonUrl = `data/wind_${y}${m}${d}_${t}.json`;

                $.getJSON(jsonUrl, function (data) {
                    windVelocityLayer = L.velocityLayer({
                        displayValues: true,
                        displayOptions: { velocityType: 'Wind', position: 'bottomleft' },
                        data: data, maxVelocity: 25,
                        colorScale: ["#3288bd", "#66c2a5", "#abdda4", "#e6f598", "#fee08b", "#fdae61", "#f46d43", "#d53e4f"]
                    });
                    windVelocityLayer.addTo(map);
                }).fail(function() {
                    console.error("Wind data for " + y + "-" + m + "-" + d + " at " + t + " UTC not generated yet.");
                });
            }
        }

        $('input[name="basemap"]').change(function() {
            if ($(this).val() === 'dark') { 
                map.removeLayer(oceanMap); 
                darkMap.addTo(map); 
            } else { 
                map.removeLayer(darkMap); 
                oceanMap.addTo(map); 
            }
        });

        $('input[name="parameter"]').change(updateStaticLayer);
        $('#toggle-wind-anim').change(updateWindLayer);

    </script>
</body>
</html>
