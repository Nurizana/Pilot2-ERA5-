<!DOCTYPE html>
<html lang="en">
<head>
    <title>ERA5 Monthly Weather Map</title>
    <meta charset="utf-8" />
    <!-- Ensures proper scaling on all mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-velocity@1.6.0/dist/leaflet-velocity.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-velocity@1.6.0/dist/leaflet-velocity.min.css"/>
    
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: Arial, sans-serif; overflow: hidden; 
            background: #111;
        }
        
        #map { width: 100%; height: 100%; z-index: 1; }
        
        /* The main control panel container */
        #control-panel {
            position: absolute; 
            top: 20px; 
            right: 0; 
            width: 290px; 
            height: calc(100% - 40px);
            background: rgba(30, 30, 30, 0.95); 
            color: #fff; 
            z-index: 1000;
            transform: translateX(100%);
            transition: transform 0.4s ease-in-out; 
            border-radius: 10px 0 0 10px;
            box-shadow: -2px 0 10px rgba(0,0,0,0.5); 
        }

        /* Class added via JavaScript to open the panel */
        #control-panel.open {
            transform: translateX(0);
        }

        /* The trigger ribbon attached to the left side of the panel */
        #toggle-trigger { 
            position: absolute; 
            left: -50px;
            top: 0; 
            width: 50px; 
            height: 100%; 
            background: rgba(30, 30, 30, 0.95);
            border-radius: 10px 0 0 10px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            writing-mode: vertical-rl;
            text-orientation: upright;
            letter-spacing: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: -2px 0 10px rgba(0,0,0,0.5);
            user-select: none;
            -webkit-user-select: none;
        }

        /* Scrollable content area inside the panel */
        .panel-content {
            padding: 20px;
            height: 100%;
            overflow-y: auto;
            box-sizing: border-box;
        }

        .panel-section { margin-bottom: 25px; border-bottom: 1px solid #444; padding-bottom: 15px; }
        .panel-section:last-child { border-bottom: none; }
        .panel-section h3 { margin-top: 0; font-size: 16px; color: #4da6ff; }
        label { display: block; margin-bottom: 12px; cursor: pointer; font-size: 14px; }
        
        /* Time Selection Grid */
        .time-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .time-grid select {
            flex: 1 1 40%;
            padding: 8px;
            background: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 4px;
            font-size: 14px;
        }
        .time-grid select.full-width {
            flex: 1 1 100%;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <!-- Control Panel -->
    <div id="control-panel">
        <!-- Trigger attached directly to the panel -->
        <div id="toggle-trigger">OPTIONS</div>
        
        <div class="panel-content">
            <div class="panel-section">
                <h3>1. Base Map</h3>
                <label><input type="radio" name="basemap" value="dark" checked> Dark Base Map</label>
                <label><input type="radio" name="basemap" value="ocean"> Oceans Base Map</label>
            </div>

            <div class="panel-section">
                <h3>2. Time Selection</h3>
                <div class="time-grid">
                    <select id="sel-year" title="Year"></select>
                    <select id="sel-month" title="Month"></select>
                    <select id="sel-day" title="Day"></select>
                    <select id="sel-time" class="full-width" title="Time (UTC/MYT)">
                        <option value="00">00:00 UTC / 08:00 MYT</option>
                        <option value="06">06:00 UTC / 14:00 MYT</option>
                        <option value="12">12:00 UTC / 20:00 MYT</option>
                        <option value="18">18:00 UTC / 02:00 MYT</option>
                    </select>
                </div>
            </div>

            <div class="panel-section">
                <h3>3. Weather Parameter</h3>
                <label><input type="radio" name="parameter" value="none" checked> None (Base Map Only)</label>
                <label><input type="radio" name="parameter" value="temp"> Temperature</label>
                <label><input type="radio" name="parameter" value="geo"> Geopotential</label>
                <label><input type="radio" name="parameter" value="rain"> Specific Rain Water Content</label>
            </div>

            <div class="panel-section">
                <h3>4. Wind Overlay</h3>
                <label><input type="checkbox" id="toggle-wind-anim"> Animated Wind Particles (850 hPa)</label>
            </div>
        </div>
    </div>

    <script>
        // --- UI Interactions for Mobile/Desktop ---
        var panel = document.getElementById('control-panel');
        var trigger = document.getElementById('toggle-trigger');

        // Toggle panel open/close on trigger click/tap
        trigger.addEventListener('click', function(e) {
            panel.classList.toggle('open');
            e.stopPropagation(); // Prevent map click event from firing immediately
        });

        // 1. Initialize Map - Centered on ASEAN Countries
        var map = L.map('map', { zoomControl: false }).setView([5.0, 114.0], 5);
        L.control.zoom({ position: 'topleft' }).addTo(map);

        // Close panel when tapping/clicking anywhere on the map (Mobile friendly UX)
        map.on('click', function() {
            if (panel.classList.contains('open')) {
                panel.classList.remove('open');
            }
        });

        // Prevent map clicks when interacting with the panel contents
        panel.addEventListener('click', function(e) {
            e.stopPropagation();
        });
        
        // --- ESRI DARK BASE MAP (Base + Labels combined) ---
        var darkBase = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Dark_Gray_Base/MapServer/tile/{z}/{y}/{x}');
        var darkLabels = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Dark_Gray_Reference/MapServer/tile/{z}/{y}/{x}');
        var darkMap = L.layerGroup([darkBase, darkLabels]);

        // --- ESRI OCEAN BASE MAP (Base + Labels combined) ---
        var oceanBase = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}');
        var oceanLabels = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Reference/MapServer/tile/{z}/{y}/{x}');
        var oceanMap = L.layerGroup([oceanBase, oceanLabels]);

        // Add Default Base Map
        darkMap.addTo(map);

        // Layer Variables
        var currentImageLayer = null;
        var windVelocityLayer = null;
        var imageBounds = [[90, 0], [-90, 360]]; // Global bounds for ERA5

        // --- Populate Time Dropdowns dynamically ---
        var yearSelect = document.getElementById('sel-year');
        for (let i = 2020; i <= 2026; i++) {
            yearSelect.add(new Option("Year " + i, i));
        }
        yearSelect.value = "2026"; // Set default year

        var monthSelect = document.getElementById('sel-month');
        for (let i = 1; i <= 12; i++) {
            let mStr = (i < 10 ? '0' : '') + i;
            monthSelect.add(new Option("Month " + mStr, mStr));
        }

        var daySelect = document.getElementById('sel-day');
        for (let i = 1; i <= 31; i++) {
            let dayStr = (i < 10 ? '0' : '') + i;
            daySelect.add(new Option("Day " + dayStr, dayStr));
        }

        // Function to load Image Overlay
        function updateStaticLayer() {
            var selectedParam = $('input[name="parameter"]:checked').val();
            var y = $('#sel-year').val();
            var m = $('#sel-month').val();
            var d = $('#sel-day').val();
            var t = $('#sel-time').val();

            if (currentImageLayer) {
                map.removeLayer(currentImageLayer);
                currentImageLayer = null;
            }

            if (selectedParam !== 'none') {
                // Adjust this URL structure to match your actual local data files
                // Example: data/temp_20260722_00.png
                var imageUrl = `data/${selectedParam}_${y}${m}${d}_${t}.png`;
                currentImageLayer = L.imageOverlay(imageUrl, imageBounds, { opacity: 0.65 });
                currentImageLayer.addTo(map);
            }
        }

        // Function to load Wind JSON
        function updateWindLayer() {
            if (windVelocityLayer) {
                map.removeLayer(windVelocityLayer);
                windVelocityLayer = null;
            }

            if ($('#toggle-wind-anim').is(':checked')) {
                var y = $('#sel-year').val();
                var m = $('#sel-month').val();
                var d = $('#sel-day').val();
                var t = $('#sel-time').val();
                
                // Adjust this URL structure to match your wind JSON file names
                // Example: data/wind_20260722_00.json
                var jsonUrl = `data/wind_${y}${m}${d}_${t}.json`;

                $.getJSON(jsonUrl, function (data) {
                    windVelocityLayer = L.velocityLayer({
                        displayValues: true,
                        displayOptions: { velocityType: 'Wind', position: 'bottomleft' },
                        data: data, maxVelocity: 25,
                        colorScale: ["#3288bd", "#66c2a5", "#abdda4", "#e6f598", "#fee08b", "#fdae61", "#f46d43", "#d53e4f"]
                    });
                    windVelocityLayer.addTo(map);
                }).fail(function() {
                    console.error("Wind data for " + y + "-" + m + "-" + d + " at " + t + " UTC not generated yet.");
                });
            }
        }

        // Event Listeners for UI Changes
        $('input[name="basemap"]').change(function() {
            if ($(this).val() === 'dark') { 
                map.removeLayer(oceanMap); 
                darkMap.addTo(map); 
            } else { 
                map.removeLayer(darkMap); 
                oceanMap.addTo(map); 
            }
        });

        $('input[name="parameter"]').change(updateStaticLayer);
        $('#sel-year, #sel-month, #sel-day, #sel-time').change(function() {
            updateStaticLayer();
            updateWindLayer();
        });
        $('#toggle-wind-anim').change(updateWindLayer);

    </script>
</body>
</html>
