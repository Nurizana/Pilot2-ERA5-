<!DOCTYPE html>
<html lang="en">
<head>
    <title>ERA5 Monthly Weather Map</title>
    <meta charset="utf-8" />
    <!-- Ensures proper scaling on all mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-velocity@1.6.0/dist/leaflet-velocity.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-velocity@1.6.0/dist/leaflet-velocity.min.css"/>
    
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: Arial, sans-serif; overflow: hidden; 
            background: #111;
        }
        
        #map { width: 100%; height: 100%; z-index: 1; }
        
        /* The main control panel container */
        #control-panel {
            position: absolute; 
            top: 20px; 
            right: 0; 
            width: 320px; /* Slightly wider to accommodate custom rolling lists */
            height: calc(100% - 40px);
            background: rgba(30, 30, 30, 0.95); 
            color: #fff; 
            z-index: 1000;
            transform: translateX(100%);
            transition: transform 0.4s ease-in-out; 
            border-radius: 10px 0 0 10px;
            box-shadow: -2px 0 10px rgba(0,0,0,0.5); 
        }

        /* Class added via JavaScript to open the panel */
        #control-panel.open {
            transform: translateX(0);
        }

        /* The trigger ribbon attached to the left side of the panel */
        #toggle-trigger { 
            position: absolute; 
            left: -50px;
            top: 0; 
            width: 50px; 
            height: 100%; 
            background: rgba(30, 30, 30, 0.95);
            border-radius: 10px 0 0 10px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            writing-mode: vertical-rl;
            text-orientation: upright;
            letter-spacing: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: -2px 0 10px rgba(0,0,0,0.5);
            user-select: none;
            -webkit-user-select: none;
        }

        /* Scrollable content area inside the panel */
        .panel-content {
            padding: 20px;
            height: 100%;
            overflow-y: auto;
            box-sizing: border-box;
        }

        .panel-section { margin-bottom: 25px; border-bottom: 1px solid #444; padding-bottom: 15px; }
        .panel-section:last-child { border-bottom: none; }
        .panel-section h3 { margin-top: 0; font-size: 16px; color: #4da6ff; }
        label { display: block; margin-bottom: 12px; cursor: pointer; font-size: 14px; }
        
        /* Custom Rolling Time Selection Grid */
        .custom-time-selector {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .time-row {
            display: flex;
            align-items: flex-start;
        }

        .time-label {
            width: 130px;
            font-size: 14px;
            padding-top: 8px;
            color: #ddd;
        }

        .time-list {
            flex: 1;
            height: 110px; /* Gives the rolling capability visual */
            overflow-y: auto;
            background: #222;
            border: 1px solid #555;
            border-radius: 4px;
            scrollbar-width: thin; /* Firefox */
        }
        
        /* Custom Scrollbar for webkit (Chrome, Safari, Edge) */
        .time-list::-webkit-scrollbar {
            width: 6px;
        }
        .time-list::-webkit-scrollbar-thumb {
            background: #666;
            border-radius: 3px;
        }
        .time-list::-webkit-scrollbar-track {
            background: #222;
        }

        .time-item {
            padding: 8px;
            font-size: 14px;
            text-align: center;
            cursor: pointer;
            color: #aaa;
            transition: background 0.2s, color 0.2s;
            user-select: none;
        }

        .time-item:hover {
            background: #333;
            color: #fff;
        }

        .time-item.active {
            background: #4da6ff;
            color: #000;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <!-- Control Panel -->
    <div id="control-panel">
        <!-- Trigger attached directly to the panel -->
        <div id="toggle-trigger">OPTIONS</div>
        
        <div class="panel-content">
            <div class="panel-section">
                <h3>1. Base Map</h3>
                <label><input type="radio" name="basemap" value="dark" checked> Dark Base Map</label>
                <label><input type="radio" name="basemap" value="ocean"> Oceans Base Map</label>
            </div>

            <div class="panel-section">
                <h3>2. Time Selection</h3>
                <!-- Custom Rolling Selectors -->
                <div class="custom-time-selector">
                    <div class="time-row">
                        <div class="time-label">Year:</div>
                        <div class="time-list" id="list-year"></div>
                    </div>
                    <div class="time-row">
                        <div class="time-label">Month:</div>
                        <div class="time-list" id="list-month"></div>
                    </div>
                    <div class="time-row">
                        <div class="time-label">Day:</div>
                        <div class="time-list" id="list-day"></div>
                    </div>
                    <div class="time-row">
                        <div class="time-label">Time (UTC/MYT):</div>
                        <div class="time-list" id="list-time"></div>
                    </div>
                </div>
            </div>

            <div class="panel-section">
                <h3>3. Weather Parameter</h3>
                <label><input type="radio" name="parameter" value="none" checked> None (Base Map Only)</label>
                <label><input type="radio" name="parameter" value="temp"> Temperature</label>
                <label><input type="radio" name="parameter" value="geo"> Geopotential</label>
                <label><input type="radio" name="parameter" value="rain"> Specific Rain Water Content</label>
                <label><input type="radio" name="parameter" value="wind"> Wind Layer</label>
            </div>

            <div class="panel-section">
                <h3>4. Wind Overlay</h3>
                <label><input type="checkbox" id="toggle-wind-anim"> Animated Wind Particles (850 hPa)</label>
            </div>
        </div>
    </div>

    <script>
        // --- UI Interactions for Mobile/Desktop ---
        var panel = document.getElementById('control-panel');
        var trigger = document.getElementById('toggle-trigger');

        // Toggle panel open/close on trigger click/tap
        trigger.addEventListener('click', function(e) {
            panel.classList.toggle('open');
            e.stopPropagation(); // Prevent map click event from firing immediately
        });

        // 1. Initialize Map - Centered on ASEAN Countries
        var map = L.map('map', { zoomControl: false }).setView([5.0, 114.0], 5);
        L.control.zoom({ position: 'topleft' }).addTo(map);

        // Close panel when tapping/clicking anywhere on the map (Mobile friendly UX)
        map.on('click', function() {
            if (panel.classList.contains('open')) {
                panel.classList.remove('open');
            }
        });

        // Prevent map clicks when interacting with the panel contents
        panel.addEventListener('click', function(e) {
            e.stopPropagation();
        });
        
        // --- ESRI DARK BASE MAP (Base + Labels combined) ---
        var darkBase = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Dark_Gray_Base/MapServer/tile/{z}/{y}/{x}');
        var darkLabels = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Dark_Gray_Reference/MapServer/tile/{z}/{y}/{x}');
        var darkMap = L.layerGroup([darkBase, darkLabels]);

        // --- ESRI OCEAN BASE MAP (Base + Labels combined) ---
        var oceanBase = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}');
        var oceanLabels = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Reference/MapServer/tile/{z}/{y}/{x}');
        var oceanMap = L.layerGroup([oceanBase, oceanLabels]);

        // Add Default Base Map
        darkMap.addTo(map);

        // Layer Variables
        var currentImageLayer = null;
        var windVelocityLayer = null;
        var imageBounds = [[90, 0], [-90, 360]]; // Global bounds for ERA5

        // --- Custom Time Selection State & Logic ---
        let timeState = {
            year: '2026',
            month: '01',
            day: '01',
            time: '00'
        };

        const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        const timeOptions = [
            { val: '00', label: '00:00/08:00' },
            { val: '06', label: '06:00/14:00' },
            { val: '12', label: '12:00/20:00' },
            { val: '18', label: '18:00/02:00' }
        ];

        // Generic function to render a rolling list
        function renderList(containerId, items, selectedValue, onSelect) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            items.forEach(item => {
                let div = document.createElement('div');
                div.className = 'time-item' + (item.value === selectedValue ? ' active' : '');
                div.innerText = item.label;
                div.dataset.value = item.value;
                
                div.onclick = function() {
                    onSelect(item.value);
                };
                container.appendChild(div);
            });

            // Scroll the active item into view on initial load
            const activeItem = container.querySelector('.active');
            if (activeItem) {
                activeItem.scrollIntoView({ block: 'center', behavior: 'smooth' });
            }
        }

        // Fast update for active class (keeps scroll position)
        function updateActiveClasses(containerId, selectedValue) {
            const container = document.getElementById(containerId);
            const items = container.getElementsByClassName('time-item');
            
            for (let item of items) {
                if (item.dataset.value === selectedValue) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            }
        }

        // Updates maximum allowable days depending on leap years and chosen month
        function updateDaysList() {
            // "Date(year, month, 0)" gets the last day of the previous month.
            // Since our state.month is '01' to '12', passing it directly calculates accurately 
            // the max days for the currently selected month.
            let maxDays = new Date(parseInt(timeState.year), parseInt(timeState.month), 0).getDate();
            
            // Cap the selected day if it exceeds the new month's limit
            if (parseInt(timeState.day) > maxDays) {
                timeState.day = maxDays.toString().padStart(2, '0');
            }
            
            let days = [];
            for (let i = 1; i <= maxDays; i++) {
                let val = i.toString().padStart(2, '0');
                days.push({ label: val, value: val });
            }
            
            // Re-render entirely because the list length might change
            renderList('list-day', days, timeState.day, (val) => {
                timeState.day = val;
                updateActiveClasses('list-day', timeState.day);
                triggerMapUpdate();
            });
        }

        // Initialize all the lists
        function initTimeSelectors() {
            let years = [];
            for (let i = 2026; i >= 2020; i--) {
                years.push({ label: i.toString(), value: i.toString() });
            }
            
            let months = monthNames.map((m, i) => {
                let val = (i + 1).toString().padStart(2, '0');
                return { label: m, value: val };
            });

            let times = timeOptions.map(t => ({ label: t.label, value: t.val }));

            renderList('list-year', years, timeState.year, (val) => {
                timeState.year = val;
                updateActiveClasses('list-year', timeState.year);
                updateDaysList(); // Month logic depends on Year (leap years)
                triggerMapUpdate();
            });

            renderList('list-month', months, timeState.month, (val) => {
                timeState.month = val;
                updateActiveClasses('list-month', timeState.month);
                updateDaysList(); // Days depend on Month
                triggerMapUpdate();
            });

            renderList('list-time', times, timeState.time, (val) => {
                timeState.time = val;
                updateActiveClasses('list-time', timeState.time);
                triggerMapUpdate();
            });

            updateDaysList(); 
        }

        // Start initialization
        initTimeSelectors();

        // Single execution pathway to trigger map data reload
        function triggerMapUpdate() {
            updateStaticLayer();
            updateWindLayer();
        }

        // --- Map Update Functions ---

        // Function to load Image Overlay
        function updateStaticLayer() {
            var selectedParam = $('input[name="parameter"]:checked').val();
            var y = timeState.year;
            var m = timeState.month;
            var d = timeState.day;
            var t = timeState.time;

            if (currentImageLayer) {
                map.removeLayer(currentImageLayer);
                currentImageLayer = null;
            }

            if (selectedParam !== 'none') {
                // Adjust this URL structure to match your actual local data files
                // Example: data/temp_20260722_00.png
                var imageUrl = `data/${selectedParam}_${y}${m}${d}_${t}.png`;
                currentImageLayer = L.imageOverlay(imageUrl, imageBounds, { opacity: 0.65 });
                currentImageLayer.addTo(map);
            }
        }

        // Function to load Wind JSON
        function updateWindLayer() {
            if (windVelocityLayer) {
                map.removeLayer(windVelocityLayer);
                windVelocityLayer = null;
            }

            if ($('#toggle-wind-anim').is(':checked')) {
                var y = timeState.year;
                var m = timeState.month;
                var d = timeState.day;
                var t = timeState.time;
                
                // Adjust this URL structure to match your wind JSON file names
                // Example: data/wind_20260722_00.json
                var jsonUrl = `data/wind_${y}${m}${d}_${t}.json`;

                $.getJSON(jsonUrl, function (data) {
                    windVelocityLayer = L.velocityLayer({
                        displayValues: true,
                        displayOptions: { velocityType: 'Wind', position: 'bottomleft' },
                        data: data, maxVelocity: 25,
                        colorScale: ["#3288bd", "#66c2a5", "#abdda4", "#e6f598", "#fee08b", "#fdae61", "#f46d43", "#d53e4f"]
                    });
                    windVelocityLayer.addTo(map);
                }).fail(function() {
                    console.error("Wind data for " + y + "-" + m + "-" + d + " at " + t + " UTC not generated yet.");
                });
            }
        }

        // --- Event Listeners for Base Map & Parameter Changes ---
        $('input[name="basemap"]').change(function() {
            if ($(this).val() === 'dark') { 
                map.removeLayer(oceanMap); 
                darkMap.addTo(map); 
            } else { 
                map.removeLayer(darkMap); 
                oceanMap.addTo(map); 
            }
        });

        $('input[name="parameter"]').change(updateStaticLayer);
        $('#toggle-wind-anim').change(updateWindLayer);

    </script>
</body>
</html>
